name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Provide necessary environment variables from GitHub Secrets so Playwright tests have credentials in CI
    env:
      ORANGE_USERNAME: ${{ secrets.ORANGE_USERNAME }}
      ORANGE_PASSWORD: ${{ secrets.ORANGE_PASSWORD }}
      ORANGE_INVALIDUSERNAME: ${{ secrets.ORANGE_INVALIDUSERNAME }}
      ORANGE_INVALIDPASSWORD: ${{ secrets.ORANGE_INVALIDPASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chrome

      - name: Run Playwright tests
        run: npx playwright test --workers=2

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
